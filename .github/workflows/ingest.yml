name: Ingest order-book filings

# Runs on a schedule (every 6h) and on-demand via the "Run workflow" button.
# Scheduled runs use the code defaults (INGEST_DAYS=2, INGEST_LIMIT=10, no master
# force-rebuild) since they have no dispatch inputs.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to fetch BSE announcements (INGEST_DAYS)"
        required: false
        default: "2"
        type: string
      pdf_limit:
        description: "Max PDFs to read for enrichment this run (INGEST_LIMIT — cost cap)"
        required: false
        default: "5"
        type: string
      force_master:
        description: "Force-rebuild the BSE<->NSE<->ISIN security master (else weekly cache)"
        required: false
        default: false
        type: boolean
  schedule:
    # Every 6 hours (UTC): fetch new orders, read PDFs, re-tag industries.
    - cron: "0 */6 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BSE reader
        run: python main.py
        env:
          # Fetch window (dispatch input, or 2 for scheduled runs)
          INGEST_DAYS: ${{ inputs.days || '2' }}
          # PDF-enrichment cap per run (dispatch input, or 10 for scheduled runs)
          INGEST_LIMIT: ${{ inputs.pdf_limit || '10' }}
          # Force-rebuild the security master (else it refreshes at most weekly)
          FORCE_MASTER_REBUILD: ${{ inputs.force_master || false }}
          # Proxy + APIs
          SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # Cloudflare D1 (may be empty for now -> the reader runs in DRY-RUN mode)
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          # Optional
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          MUNS_TOKEN: ${{ secrets.MUNS_TOKEN }}
