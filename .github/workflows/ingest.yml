name: Ingest order-book filings

# Manual trigger for now ("Run workflow" button in the Actions tab).
# A scheduled trigger is added in a later step — see the commented block below.
on:
  workflow_dispatch:
  # schedule:
  #   # Every 6 hours (UTC). Enable once real ingestion is in place.
  #   - cron: "0 */6 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        run: python main.py
        env:
          # Required secrets
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          # Optional secrets
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          MUNS_TOKEN: ${{ secrets.MUNS_TOKEN }}
